{% extends "base.html" %} {% load static %} {% block style %} <link
rel="stylesheet" href="{% static "css/style.css" %}"> <link rel="stylesheet"
href="{% static "vendor/bootstrap.css" %}">

{% endblock style %} {% block content %} {% include "snippets/header.html" %}
<!-- prettier-ignore -->
{% block title %}
<div class="w-full h-[70px] bg-[#002846] flex items-center pl-15">
  <ul class="flex text-[#fff] m-0 gap-4">
    <li>Home</li>
    <li>/</li>
    <li>{{title.0}}</li>
  </ul>
</div>
{% endblock title %}
<!-- prettier-ignore -->
{% endblock content %} {% block script %}
<script>
  const navLinks = document.querySelector(".nav-links");
  function onToggleMenu(e) {
    e.name = e.name === "menu-outline" ? "close-outline" : "menu-outline";
    navLinks.classList.toggle("invisible");
  }
</script>

<script>
  const navLinks2 = document.querySelector(".nav-links2");

    e.name == "menu-outline2"
    navLinks2.classList.toggle("hidden");

</script>
